services:
  api:
    build: .
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  telegram:
    build: .
    restart: unless-stopped
    command: ["python", "-m", "operation_drake.main", "--channel", "telegram"]
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    depends_on:
      api:
        condition: service_healthy
